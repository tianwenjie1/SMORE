embedding_size: 64
n_ui_layers: 3
n_layers: 1
learning_rate_scheduler:
- 0.96
- 50
lambda_coeff: 0.9
reg_weight: 1.0e-05
learning_rate: 0.001

cl_loss: 0.01
temperature: 0.2
image_knn_k: 40
text_knn_k: 10

dropout_rate: 0

# ============================================================
# Innovation Points
# ============================================================
# Innovation 1: Frequency Band Gating (频段门控)
freq_band_gating: False

# Innovation 2: Modality Reliability Gating (模态可靠性门控)
modality_reliability_gating: False

# Innovation 3: Modality Dropout Robust Training (模态Dropout鲁棒训练)
modality_dropout_rate: 0.0

# Innovation 4: Graph Edge Reweighting (图边重加权)
graph_edge_reweighting: False

# ============================================================
# Robustness / MQS Evaluation (推理阶段模态扰动, 默认 normal 不扰动)
# ============================================================
robust_eval_mode: normal    # normal / drop_image / drop_text / noise_image / noise_text / noise_both
                            # / shuffle_image / shuffle_text / mismatch
                            # / tail_noise_image / tail_noise_text / tail_noise_both
                            # / tail_missing_image / tail_missing_text
                            # / pop_missing_image / pop_missing_text
robust_noise_std: 0.1
robust_shift_ratio: 0.3     # fraction for shuffle / mismatch / pop-missing
robust_tail_ratio: 0.3      # fraction of least-popular items counted as tail

# ============================================================
# MQR: Modality-Quality Preference Stabilization (training-side)
# Builds a degraded view (sampled env: noise_both/mismatch/tail_noise_both)
# and enforces preference stability between clean & degraded views.
# Ablation switches: mqr_alpha=0 -> no degraded-BPR; mqr_beta=0 -> no PS loss.
# ============================================================
mqr_enabled: False
mqr_alpha: 0.5              # weight of BPR on degraded view
mqr_beta: 0.2               # weight of preference-stability (KL) loss
mqr_tau: 1.0                # temperature for score softmax in PS loss
mqr_tail_weight: True       # tail-sensitive weighting of PS loss
train_noise_std: 0.0        # naive noise augmentation (ablation baseline, NOT MQR)

hyper_parameters:
- seed
